services:
  postgres:
    image: postgres:17-alpine
    container_name: ironprint-db
    environment:
      POSTGRES_DB: ironprint
      POSTGRES_USER: ironprint
      POSTGRES_PASSWORD: ironprint_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
